<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrando — DecoIArte</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#0F0F1A; color:#F8FAFC;
               min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; }
        .logo { font-size:28px; font-weight:800; background:linear-gradient(135deg,#3B82F6,#7C3AED);
                -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
        .spinner { width:44px; height:44px; border:4px solid rgba(124,58,237,0.2);
                   border-top-color:#7C3AED; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        p { color:#94A3B8; font-size:15px; }
    </style>
</head>
<body>
    <div class="logo">DecoIArte</div>
    <div class="spinner"></div>
    <p>Verificando tu cuenta...</p>

<script>
const SUPABASE_URL      = 'https://cqwbsikyzdtegutyvgfo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd2JzaWt5emR0ZWd1dHl2Z2ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NTk5MjUsImV4cCI6MjA5NDMzNTkyNX0.v9Qmp85POur1zZ3nHVYNRyhqHAi4VawafBsCiXF72Yo';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function detectarRol() {
    const { data:{ session } } = await db.auth.getSession();

    // Sin sesión → registro (primera vez o login)
    if (!session) { window.location.href = '/registro'; return; }

    const email = session.user.email;

    // ¿Es empresa?
    const { data:empresa } = await db.from('empresas')
        .select('id').eq('email', email).maybeSingle();
    if (empresa) { window.location.href = '/dashboard'; return; }

    // ¿Es consumidor?
    const { data:consumidor } = await db.from('consumidores')
        .select('id').eq('email', email).maybeSingle();
    if (consumidor) { window.location.href = '/marketplace'; return; }

    // Existe sesión Google pero no tiene rol → elegir rol
    window.location.href = '/registro';
}

window.addEventListener('DOMContentLoaded', detectarRol);
</script>
</body>
</html>
